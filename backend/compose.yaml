services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: volna
      POSTGRES_USER: volna
      POSTGRES_PASSWORD: volna
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U volna -d volna"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build: .
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: "postgres://volna:volna@db:5432/volna?sslmode=disable"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres-data:
